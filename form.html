<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Booking Form</title>
</head>
<body>
    
    <div style="width: 55%;margin-right: 40%;margin-left: 20%;margin-top: 10%;margin-bottom: 30%;background-color:white;height: 213px;border:2px solid black ;">
        <div style="display: flex;">
            <div style="width: 20%;height: 22px;border: 1px solid black;margin-right: 3px;margin-left: 2px;margin-top: 2px;">Name</div>
            <div style="width: 80%;height: 22px;border: 1px solid black;margin-bottom: 3px;margin-right: 3px;margin-top: 2px;">
                <div style="width: 22%;border: 1px solid black;margin-top: 1px;margin-left: 1px;">Enter Name</div>

            </div>

        </div>

        <div style="display: flex;">
            <div style="width: 20%;height: 22px;border: 1px solid black;margin-right: 3px;margin-left: 2px;">Email</div>
            <div style="width: 80%;height: 22px;border: 1px solid black;margin-bottom: 3px;margin-right: 3px;">
                 <div style="width: 22%;border: 1px solid black;margin-top: 1px;margin-left: 1px;">Enter Email</div>

            </div>

        </div>

        <div style="display: flex;">
              <div style="width: 20%;height: 22px;border: 1px solid black;margin-right: 3px;margin-left: 2px;">Mobile Number</div>
            <div style="width: 80%;height: 22px;border: 1px solid black;margin-bottom: 3px;margin-right: 3px;">
                 <div style="width: 28%;border: 1px solid black;margin-top: 1px;margin-left: 1px;">Enter Mobile Number</div>

            </div>

        </div>

        <div style="display: flex;">
            <div style="width: 20%;height: 22px;border: 1px solid black;margin-right: 3px;margin-left: 2px;">Arrival Date</div>
            <div style="width: 80%;height: 22px;border: 1px solid black;margin-bottom: 3px;margin-right: 3px;">
                 <div style="width: 28%;border: 1px solid black;margin-top: 1px;margin-left: 1px;">dd ---- yyyy
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

                    <i style="padding-left: 45px;" class="fa fa-calendar"></i>
                 </div>

            </div>


        </div>

        <div style="display: flex;">
             <div style="width: 20%;height: 22px;border: 1px solid black;margin-right: 3px;margin-left: 2px;">Room Type</div>
            <div style="width: 80%;height: 22px;border: 1px solid black;margin-bottom: 3px;display: flex;margin-right: 3px;">
                <div style="border: 1px solid black;width: 2%;height: 10px; margin: 3px; border-radius: 50%;margin-right: 10%;"></div>
                single
                <div style="border: 1px solid black;width: 2%;height: 10px; margin: 3px; border-radius: 50%;margin-right: 10%;"></div>
                Double
                <div style="border: 1px solid black;width: 2%;height: 10px; margin: 3px; border-radius: 50%;margin-right: 10%;"></div>
                Presidential Suite
                
                 
            </div>
        </div>

        <div style="display: flex;">
             <div style="width: 20%;height: 22px;border: 1px solid black;margin-right: 3px;margin-left: 2px;">Preferences</div>
            <div style="width: 80%;height: 22px;border: 1px solid black;margin-bottom: 3px;display: flex;margin-right: 3px;">
                 <div style="border: 1px solid black;width: 2%;height: 10px; margin: 3px; border-radius: 20%;margin-right: 10%;"></div>
                Non Smoking
                <div style="border: 1px solid black;width: 2%;height: 10px; margin: 3px; border-radius: 20%;margin-right: 10%;"></div>
                Internet
                <div style="border: 1px solid black;width: 2%;height: 10px; margin: 3px; border-radius: 20%;margin-right: 10%;"></div>
                Firm Mattress
                 

            </div>


        </div>

        <div style="display: flex;">
            <div style="width: 20%;height: 22px;border: 1px solid black;margin-right: 3px;margin-left: 2px;">Mode Of payment</div>
            <div style="width: 80%;height: 22px;border: 1px solid black;margin-bottom: 3px;margin-right: 3px;">
                 <div style="width: 28%;border: 1px solid black;margin-top: 1px;margin-left: 1px;">Select</div>

            </div>


        </div>

        <div style=" border: 1px solid black;margin-left: 2px;margin-right: 3px;">
            
            <div style="background-color: beige;width: 10%; border: 1px solid black;margin-left:35% ;margin-top: 2px;margin-bottom: 2px;">
                Submit
            </div>

        </div>


        
       
    </div>
    
</body>
</html>
